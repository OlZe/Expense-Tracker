name: Build SPA and publish on GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 'latest'
      - run: npm ci
      - run: ng build --base-href /Expense-Tracker/ --optimization
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/expense-tracker/browser
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
