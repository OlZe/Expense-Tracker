<div style="view-transition-name: slide-view-over">
  <h1 class="text-3xl">Edit {{ category.name }}</h1>

  <h2 class="text-2xl mt-10">Change name</h2>
  <form class="mt-5">
    <mat-form-field class="w-full">
      <mat-label>New name</mat-label>
      <input matInput [(ngModel)]="newName" name="newName" />
    </mat-form-field>

    <p class="text-gray-500">
      Changing the name will also change the name in all associated expenses.
    </p>

    <button
      matButton="filled"
      [disabled]="isChangeNameButtonDisabled()"
      (click)="changeName()"
      class="mt-3"
    >
      Save
    </button>
  </form>

  <h2 class="text-2xl mt-15">Delete</h2>

  <form class="mt-5">
    <mat-radio-group
      class="flex flex-col flex-nowrap gap-5"
      [(ngModel)]="selectedDeleteMethod"
      name="selectedDeleteMethod"
    >
      <mat-radio-button value="dontDeleteExpenses">
        Only delete this category. Associated expenses will have their category changed to 'unknown category'.
      </mat-radio-button>
      <mat-radio-button value="deleteExpenses">
        ⚠️ Delete this category and all associated expenses.
      </mat-radio-button>
    </mat-radio-group>

    <button
      matButton="filled"
      [disabled]="isDeleteDisabled()"
      (click)="delete()"
      class="app-btn-delete mt-5"
    >
      <mat-icon>delete</mat-icon>Delete
    </button>
  </form>
</div>
